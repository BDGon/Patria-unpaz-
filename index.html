<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimiento Universitario Patria</title>
    <style>
        :root {
            --azul: #004b9b;
            --celeste: #5eb0e5;
            --blanco: #ffffff;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--blanco);
            color: #333;
        }

        /* Cabecera y Botón de Donación Fijo */
        header {
            background-color: var(--azul);
            color: var(--blanco);
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-container img {
            width: 80px;
            height: auto;
            border-radius: 5px;
            background-color: white; /* Por si el logo tiene transparencias */
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-donar {
            background-color: var(--celeste);
            color: var(--blanco);
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .btn-donar:hover {
            background-color: #4a9bd0;
        }

        main {
            padding: 30px;
            max-width: 1000px;
            margin: auto;
        }

        /* Contenedores de Búsqueda y Formulario */
        .card {
            background: #f9f9f9;
            border-top: 4px solid var(--celeste);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        input[type="text"], input[type="text"]:focus {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button.action-btn {
            background-color: var(--azul);
            color: var(--blanco);
            border: none;
            padding: 12px 20px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 1rem;
            width: 100%;
            font-weight: bold;
        }

        button.action-btn:hover {
            background-color: #003875;
        }

        /* Tabla de Resultados */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: var(--azul);
            color: var(--blanco);
        }

        tr:hover {
            background-color: #f1f1f1;
        }

        /* Diseño responsive básico para celulares */
        @media (max-width: 600px) {
            header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            h1 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.jpg" alt="Logo Patria Unpaz">
            <h1>Movimiento Universitario Patria</h1>
        </div>
        <a href="https://link.mercadopago.com.ar/graxdeungrafiquito" class="btn-donar" target="_blank">Donar</a>
    </header>

    <main>
        <div class="card">
            <h2>Buscar Información</h2>
            <input type="text" id="searchInput" placeholder="Escribe para buscar (Ej: Bioética, Cód: 07, Comisión A1)..." onkeyup="filtrarTabla()">
            
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>Materia / Nombre</th>
                        <th>Año y Código</th>
                        <th>Comisiones y Correlativas</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="3">Conectando con la base de datos...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="card">
            <h2>Agregar Nuevo Registro</h2>
            <form id="addForm">
                <input type="text" id="nombre" placeholder="Nombre de la Materia o Alumno" required>
                <input type="text" id="dato" placeholder="Año y Código (Ej: 1er Año - Cód: 01)" required>
                <input type="text" id="info" placeholder="Comisiones o información adicional" required>
                <button type="submit" class="action-btn">Guardar en Base de Datos</button>
            </form>
            <p id="mensaje-form" style="display:none; color: green; margin-top: 10px; font-weight:bold;">¡Datos guardados con éxito!</p>
        </div>
    </main>

    <script>
        // Tu URL pública de Apps Script conectada al Google Sheets
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxHQgc-FVsVlIMh1ii2RimltUQSVmOWNIVOOLjNcJeqzM-tOd7wOR_zCDkJrHgH7H_gVA/exec';

        // Cargar datos al iniciar la página
        document.addEventListener("DOMContentLoaded", cargarDatos);

        function cargarDatos() {
            // Agregamos redirect: "follow" para que no se pierda al conectar con Google
            fetch(SCRIPT_URL, { redirect: "follow" })
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('tableBody');
                    tbody.innerHTML = ''; 
                    
                    if(data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="3">Aún no hay materias cargadas en la planilla.</td></tr>';
                        return;
                    }

                    data.forEach(fila => {
                        let tr = document.createElement('tr');
                        // Aseguramos que si una celda está vacía en Excel, no muestre "undefined"
                        let col1 = fila[0] || '';
                        let col2 = fila[1] || '';
                        let col3 = fila[2] || '';
                        tr.innerHTML = `<td>${col1}</td><td>${col2}</td><td>${col3}</td>`;
                        tbody.appendChild(tr);
                    });
                })
                .catch(error => {
                    console.error('Error al cargar datos:', error);
                    document.getElementById('tableBody').innerHTML = '<tr><td colspan="3" style="color:red;">Error de conexión con la base de datos.</td></tr>';
                });
        }

        // Función de búsqueda en tiempo real
        function filtrarTabla() {
            let input = document.getElementById("searchInput").value.toUpperCase();
            let tr = document.getElementById("dataTable").getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) {
                let tdArray = tr[i].getElementsByTagName("td");
                let coincidencia = false;
                for (let j = 0; j < tdArray.length; j++) {
                    if (tdArray[j] && tdArray[j].innerHTML.toUpperCase().indexOf(input) > -1) {
                        coincidencia = true;
                        break;
                    }
                }
                tr[i].style.display = coincidencia ? "" : "none";
            }
        }

        // Enviar nuevos datos al Google Sheets saltando el bloqueo CORS
        document.getElementById('addForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btnSubmit = document.querySelector('.action-btn');
            btnSubmit.innerText = 'Guardando...';
            btnSubmit.disabled = true;

            const formData = new FormData();
            formData.append('nombre', document.getElementById('nombre').value);
            formData.append('dato', document.getElementById('dato').value);
            formData.append('info', document.getElementById('info').value);

            // mode: 'no-cors' le dice al navegador que no bloquee la petición por seguridad
            fetch(SCRIPT_URL, {
                method: 'POST',
                body: formData,
                mode: 'no-cors'
            })
            .then(() => {
                // Al usar no-cors, no podemos leer la respuesta exacta de Google, 
                // pero asumimos el éxito y mostramos el mensaje.
                document.getElementById('mensaje-form').style.display = 'block';
                document.getElementById('addForm').reset();
                
                // Esperamos 2 segundos para darle tiempo a Google de guardar en el Excel y recargamos la tabla
                setTimeout(() => {
                    cargarDatos();
                    document.getElementById('mensaje-form').style.display = 'none';
                }, 2000);
            })
            .catch(error => {
                console.error('Error al guardar:', error);
                alert("Hubo un problema al guardar los datos.");
            })
            .finally(() => {
                btnSubmit.innerText = 'Guardar en Base de Datos';
                btnSubmit.disabled = false;
            });
        });
    </script>
</body>
</html>
