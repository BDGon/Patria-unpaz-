<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimiento Universitario Patria - Bioimágenes</title>
    <style>
        :root { --azul: #004b9b; --celeste: #5eb0e5; --blanco: #ffffff; }
        
        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            color: #333;
            /* --- CAMBIO AQUÍ PARA EL FONDO --- */
            /* Asegúrate de guardar tu imagen como 'fondo.jpg' en la misma carpeta */
            background-image: url('fondo.jpg'); 
            background-repeat: no-repeat;
            background-size: cover; /* Cubre toda la pantalla */
            background-position: center; /* Centra la imagen */
            background-attachment: fixed; /* El fondo se queda quieto al hacer scroll */
        }

        header { 
            background-color: var(--azul); 
            color: var(--blanco); 
            padding: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
        }

        .logo-container { display: flex; align-items: center; gap: 15px; }
        .logo-container img { width: 80px; height: auto; border-radius: 5px; background-color: white; }
        h1 { margin: 0; font-size: 1.5rem; text-transform: uppercase; letter-spacing: 1px; }

        main { 
            padding: 30px; 
            max-width: 1000px; 
            margin: auto; 
            overflow-x: hidden; 
        }

        .card { 
            /* Mantenemos un fondo semi-transparente para que el texto sea legible */
            background: rgba(249, 249, 249, 0.95); 
            border-top: 4px solid var(--celeste); 
            padding: 20px; 
            border-radius: 8px; 
            margin-bottom: 30px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
        }

        input[type="text"], input[type="text"]:focus { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button.action-btn { background-color: var(--azul); color: var(--blanco); border: none; padding: 12px 20px; cursor: pointer; border-radius: 4px; font-size: 1rem; width: 100%; font-weight: bold; }
        button.action-btn:hover { background-color: #003875; }
        
        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; min-width: 600px; background-color: white; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: var(--azul); color: var(--blanco); }
        tr:hover { background-color: #f1f1f1; }
        
        .btn-whatsapp { background-color: #25D366; color: white !important; padding: 8px 12px; border-radius: 5px; text-decoration: none; font-weight: bold; display: inline-block; margin: 4px 0; font-size: 0.9rem; text-align: center; }
        @media (max-width: 600px) { header { flex-direction: column; gap: 15px; text-align: center; } h1 { font-size: 1.2rem; } main { padding: 15px; } }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.jpg" alt="Logo Patria Unpaz">
            <h1>Movimiento Universitario Patria
            bioimagenes</h1>
        </div>
    </header>

    <main>
        <div class="card">
            <h2>Buscar Materias y Comisiones</h2>
            <input type="text" id="searchInput" placeholder="Buscar por materia, año o comisión..." onkeyup="filtrarTabla()">
            
            <div class="table-responsive">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>Materia</th>
                            <th>Año</th>
                            <th>Comisión</th>
                            <th>Grupo de WhatsApp</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td colspan="4">Conectando con la base de datos...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h2>Agregar Nueva Comisión</h2>
            <form id="addForm">
                <input type="text" id="materia" placeholder="Nombre de la Materia" required>
                <input type="text" id="año" placeholder="Año (Ej: 1er Año)" required>
                <input type="text" id="comision" placeholder="Comisión (Ej: A1)" required>
                <input type="text" id="whatsapp" placeholder="Enlace de WhatsApp">
                <button type="submit" class="action-btn">Guardar en Base de Datos</button>
            </form>
            <p id="mensaje-form" style="display:none; color: green; margin-top: 10px; font-weight:bold;">¡Datos guardados con éxito!</p>
        </div>
    </main>

    <script>
        // Tu URL pública actualizada
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwrcg1VI3tbusFvPqIdZyX2MXgP9epsW0VE83pUVmG0EutZ1M8GxpcEDe5rzPAmmA/exec';

        document.addEventListener("DOMContentLoaded", cargarDatos);

        function cargarDatos() {
            fetch(SCRIPT_URL, { redirect: "follow" })
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('tableBody');
                    tbody.innerHTML = ''; 
                    
                    if(data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="4">No hay materias cargadas en la planilla.</td></tr>';
                        return;
                    }

                    data.forEach(fila => {
                        let tr = document.createElement('tr');
                        let año = fila[0] || '';         
                        let materia = fila[1] || '';     
                        let comision = fila[2] || fila[3] || ''; 
                        let whatsapp = fila[4] || fila[5] || ''; 

                        if (typeof whatsapp === 'string' && whatsapp.includes("chat.whatsapp.com")) {
                            whatsapp = whatsapp.replace(/(https?:\/\/)?(chat\.whatsapp\.com\/[^\s<]+)/g, '<a href="https://$2" target="_blank" class="btn-whatsapp">📲 Unirse</a>');
                        } else {
                            whatsapp = '-'; 
                        }

                        tr.innerHTML = `<td>${materia}</td><td>${año}</td><td>${comision}</td><td>${whatsapp}</td>`;
                        tbody.appendChild(tr);
                    });
                })
                .catch(error => console.error('Error:', error));
        }

        function filtrarTabla() {
            let input = document.getElementById("searchInput").value.toUpperCase();
            let tr = document.getElementById("dataTable").getElementsByTagName("tr");
            for (let i = 1; i < tr.length; i++) {
                let tdArray = tr[i].getElementsByTagName("td");
                let coincidencia = false;
                for (let j = 0; j < tdArray.length; j++) {
                    if (tdArray[j] && tdArray[j].innerHTML.toUpperCase().indexOf(input) > -1) {
                        coincidencia = true; break;
                    }
                }
                tr[i].style.display = coincidencia ? "" : "none";
            }
        }

        document.getElementById('addForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btnSubmit = document.querySelector('.action-btn');
            btnSubmit.innerText = 'Guardando...';
            btnSubmit.disabled = true;

            const formData = new FormData();
            formData.append('anio', document.getElementById('año').value);
            formData.append('materia', document.getElementById('materia').value);
            formData.append('comision', document.getElementById('comision').value);
            formData.append('whatsapp', document.getElementById('whatsapp').value);

            fetch(SCRIPT_URL, { method: 'POST', body: formData, mode: 'no-cors' })
            .then(() => {
                document.getElementById('mensaje-form').style.display = 'block';
                document.getElementById('addForm').reset();
                setTimeout(() => {
                    cargarDatos(); 
                    document.getElementById('mensaje-form').style.display = 'none';
                }, 2000);
            })
            .catch(error => alert("Hubo un problema al guardar los datos."))
            .finally(() => {
                btnSubmit.innerText = 'Guardar en Base de Datos';
                btnSubmit.disabled = false;
            });
        });
    </script>
</body>
</html>
